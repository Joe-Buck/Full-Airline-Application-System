<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flight Booking</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Flight Booking</h1>
      <p class="tagline">Search and book flights with ease</p>
    </header>

    <main>
      <section class="card">
        <h2>Server Status</h2>
        <p id="health-status">Checking...</p>
      </section>

      <section class="card">
        <h2>Available Flights</h2>
        <button id="refresh-flights">Refresh</button>
        <ul id="flights-list">
          <li class="muted">No flights loaded yet.</li>
        </ul>
      </section>
    </main>

    <footer>
      <small>Backend API mounted at <code>/api</code></small>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
